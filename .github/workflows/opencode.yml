name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    env:
      # opencode's `zai`/`zai-coding-plan` provider authenticates via ZHIPU_API_KEY
      # (per models.dev), NOT ZAI_API_KEY. Without this the model never authenticates,
      # so the agent returns an empty response and creates no PR.
      ZHIPU_API_KEY: ${{ secrets.ZAI_API_KEY }}
      # Kept only so the credential-gate step below can detect a configured key.
      ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check OpenCode credentials
        id: credentials
        run: |
          if [ -n "$ZAI_API_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping opencode because ZAI_API_KEY is not configured."
          fi

      - name: Checkout repository
        if: steps.credentials.outputs.enabled == 'true'
        uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: Configure git identity
        if: steps.credentials.outputs.enabled == 'true'
        run: |
          # The @latest opencode action requires a git identity to already exist
          # (configureGit no longer sets one); without it the commit fails with
          # "Author identity unknown".
          git config --global user.name "opencode-agent[bot]"
          git config --global user.email "opencode-agent[bot]@users.noreply.github.com"

      - name: Run opencode
        if: steps.credentials.outputs.enabled == 'true'
        uses: anomalyco/opencode/github@latest
        with:
          # Coding Plan subscription -> endpoint https://api.z.ai/api/coding/paas/v4
          # (the plain `zai` provider points at the pay-as-you-go /api/paas/v4 endpoint,
          # which rejects coding-plan keys with 401 "token expired or incorrect").
          model: zai-coding-plan/glm-5.1
          use_github_token: true
