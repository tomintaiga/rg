name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    env:
      ZAI_API_KEY: ${{ secrets.ZAI_API_KEY || secrets.OPENAI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.ZAI_API_KEY || secrets.OPENAI_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check OpenCode credentials
        id: credentials
        run: |
          if [ -n "$ZAI_API_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping opencode because ZAI_API_KEY or OPENAI_API_KEY is not configured."
          fi

      - name: Checkout repository
        if: steps.credentials.outputs.enabled == 'true'
        uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: Run opencode
        if: steps.credentials.outputs.enabled == 'true'
        # Pin to the last pre-regression GitHub action revision while @latest exits non-zero after posting its response comment.
        uses: anomalyco/opencode/github@2034fabc7d481b670363b4c8984241bd15505c76
        with:
          model: zai/glm-5.1
