name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      contains(github.event.comment.body, ' /oc') ||
      startsWith(github.event.comment.body, '/oc') ||
      contains(github.event.comment.body, ' /opencode') ||
      startsWith(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    env:
      # opencode's `zai` provider authenticates via ZHIPU_API_KEY (per models.dev),
      # NOT ZAI_API_KEY / OPENAI_API_KEY. Without this the model never authenticates,
      # so the agent returns an empty response and creates no PR.
      ZHIPU_API_KEY: ${{ secrets.ZAI_API_KEY || secrets.OPENAI_API_KEY }}
      # Kept only so the credential-gate step below can detect a configured key.
      ZAI_API_KEY: ${{ secrets.ZAI_API_KEY || secrets.OPENAI_API_KEY }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check OpenCode credentials
        id: credentials
        run: |
          if [ -n "$ZAI_API_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping opencode because ZAI_API_KEY or OPENAI_API_KEY is not configured."
          fi

      - name: Checkout repository
        if: steps.credentials.outputs.enabled == 'true'
        uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: DEBUG verify key against coding endpoint
        if: steps.credentials.outputs.enabled == 'true'
        run: |
          echo "ZHIPU_API_KEY length: ${#ZHIPU_API_KEY}"
          # Detect a stray trailing newline/CR or surrounding whitespace in the secret.
          printf '%s' "$ZHIPU_API_KEY" | wc -c | sed 's/^/printf-byte-count: /'
          case "$ZHIPU_API_KEY" in
            *' '*|*'	'*) echo "WARNING: key contains whitespace" ;;
          esac
          # Reveal whitespace POSITIONS only (every non-space char -> x; tabs shown as ^I):
          echo -n "whitespace map: "; printf '%s' "$ZHIPU_API_KEY" | sed 's/[^[:space:]]/x/g' | cat -A
          CLEAN="${ZHIPU_API_KEY//[[:space:]]/}"
          echo "cleaned length: ${#CLEAN}"
          echo "--- coding endpoint, RAW secret ---"
          curl -sS -o /tmp/r.json -w "HTTP %{http_code}\n" \
            https://api.z.ai/api/coding/paas/v4/chat/completions \
            -H "Authorization: Bearer ${ZHIPU_API_KEY}" -H "Content-Type: application/json" \
            -d '{"model":"glm-4.7","messages":[{"role":"user","content":"ping"}],"max_tokens":1}'; cat /tmp/r.json; echo
          echo "--- coding endpoint, WHITESPACE-STRIPPED secret ---"
          curl -sS -o /tmp/c.json -w "HTTP %{http_code}\n" \
            https://api.z.ai/api/coding/paas/v4/chat/completions \
            -H "Authorization: Bearer ${CLEAN}" -H "Content-Type: application/json" \
            -d '{"model":"glm-4.7","messages":[{"role":"user","content":"ping"}],"max_tokens":1}'; cat /tmp/c.json; echo

      - name: Run opencode
        if: steps.credentials.outputs.enabled == 'true'
        uses: anomalyco/opencode/github@latest
        continue-on-error: true
        with:
          # Coding Plan subscription -> endpoint https://api.z.ai/api/coding/paas/v4
          # (the plain `zai` provider points at the pay-as-you-go /api/paas/v4 endpoint,
          # which rejects coding-plan keys with 401 "token expired or incorrect").
          model: zai-coding-plan/glm-5.1
          use_github_token: true
